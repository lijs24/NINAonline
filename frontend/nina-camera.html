<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>html,body{background:#0a0e1a;color:#e9e2d0;margin:0;font-family:"Noto Serif SC","Source Han Serif SC","Songti SC",serif}</style>
<link rel="stylesheet" href="/nina-theme.css">
<title>星枢 · 相机</title>
<style>
  .cam-grid{display:grid;grid-template-columns:260px 1fr 240px;gap:34px;}
  .ctl{display:flex;justify-content:space-between;align-items:center;padding:8px 0;
    border-bottom:1px solid var(--hair-soft);}
  .ctl label{color:var(--ink-dim);font-size:14px;}
  .ctl input,.ctl select{width:96px;text-align:right;}
  #view{width:100%;border:1px solid var(--hair);background:#05070d;min-height:300px;
    display:block;image-rendering:auto;}
  .prog{height:2px;background:var(--hair);margin-top:10px;}
  .prog>div{height:2px;width:0;background:var(--gold);transition:width .3s;}
  /* 拉伸 + 直方图(对标 asiair:对数填充直方图 + MTF 拉伸,黑/中/白手柄拖动即时重渲染) */
  .st-wrap{margin-top:16px;}
  .st-tools{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .cap.mini{font-size:11.5px;padding:2px 11px;}
  .hist-box{position:relative;padding-bottom:18px;}
  #hist{width:100%;height:118px;display:block;background:#05070d;border:1px solid var(--hair-soft);}
  .st-bar{position:relative;height:10px;margin-top:4px;border:1px solid var(--hair-soft);
    background:linear-gradient(90deg,#000,#6c6450,#efe6cf);cursor:crosshair;}
  .st-range{position:absolute;top:-1px;bottom:-1px;border:1px solid var(--gold);
    background:rgba(201,162,39,.14);pointer-events:none;}
  .st-h{position:absolute;top:-8px;width:14px;height:24px;transform:translateX(-50%);
    background:transparent;border:none;padding:0;cursor:ew-resize;touch-action:none;}
  .st-h::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%);}
  .st-h.blk::before{background:var(--gold);}
  .st-h.wht::before{background:#f0e6c8;}
  .st-h.src::before{background:var(--gold);opacity:.55;width:0;border-left:1px dashed var(--gold);}
  .st-h.tgt::before{background:#cdbf95;width:1px;}
  .st-h::after{content:"";position:absolute;left:50%;top:-3px;width:7px;height:7px;
    transform:translateX(-50%) rotate(45deg);}
  .st-h.blk::after{background:var(--gold);}
  .st-h.wht::after{background:#f0e6c8;}
  .st-h.src::after,.st-h.tgt::after{top:auto;bottom:-3px;width:6px;height:6px;border-radius:50%;transform:translateX(-50%);}
  .st-h.src::after{background:var(--gold);} .st-h.tgt::after{background:#cdbf95;}
  @media(max-width:980px){.cam-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header id="app-topbar"></header>

<main class="wrap view-pending">
  <div class="cam-grid">
    <!-- 左:控制 -->
    <div>
      <div class="sec-h" style="margin-top:0"><span class="rn">Ⅰ</span><h2 style="font-size:17px">曝光</h2>
        <span class="en">Exposure</span></div>
      <div class="ctl"><label>曝光 <em class="em">s</em></label><input class="fld" id="exp" type="number" step="0.5" value="3"></div>
      <div class="ctl"><label>增益 <em class="em">gain</em></label><input class="fld" id="gain" type="number" value="100"></div>
      <div class="ctl"><label>偏置 <em class="em">offset</em></label><input class="fld" id="offset" type="number" value="50"></div>
      <div class="ctl"><label>合并 <em class="em">bin</em></label>
        <select class="fld" id="bin"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
      <div class="ctl"><label>滤镜 <em class="em">filter</em></label><select class="fld" id="filter"></select></div>
      <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
        <button class="cap solid" id="btn-single">单张拍摄</button>
        <button class="cap" id="btn-loop">循环</button>
        <button class="cap danger" id="btn-abort">中止</button>
      </div>

      <div class="sec-h"><span class="rn">Ⅱ</span><h2 style="font-size:17px">制冷</h2>
        <span class="en">Cooling</span></div>
      <div class="ctl"><label>目标 <em class="em">°C</em></label><input class="fld" id="ttemp" type="number" value="-10"></div>
      <div style="display:flex;gap:10px;margin-top:12px">
        <button class="cap" id="btn-cool">制冷</button>
        <button class="cap" id="btn-warm">回温</button>
      </div>
      <div id="cool-stat" class="muted" style="margin-top:12px;font-size:13px">
        当前 <span class="v gold" id="cool-temp">--</span> · 功率 <span id="cool-power">--</span> · <span id="cool-switch">—</span></div>
      <div id="cool-none" class="muted em" style="margin-top:12px;font-size:13px;display:none">无制冷</div>
    </div>

    <!-- 中:预览 + 拉伸 -->
    <div>
      <div class="sec-h" style="margin-top:0"><span class="rn">Ⅲ</span><h2 style="font-size:17px">预览</h2>
        <span class="en">Preview</span><span id="cap-state" style="margin-left:auto;font-size:14px;color:var(--gold);letter-spacing:.4px"></span></div>
      <canvas id="view"></canvas>
      <div class="prog"><div id="prog-bar"></div></div>
      <div id="cap-detail" style="font-size:13px;margin-top:8px;min-height:18px;color:var(--gold)"></div>

      <div class="sec-h"><span class="rn">·</span><h2 style="font-size:16px">直方图 · 拉伸</h2>
        <span class="en">Histogram · Stretch</span></div>
      <div class="st-wrap">
        <div class="st-tools">
          <button class="cap mini" id="st-stf">一键拉伸</button>
          <button class="cap mini" id="st-strong">强拉伸</button>
          <button class="cap mini" id="st-linear">线性</button>
          <span class="muted" id="st-readout" style="margin-left:auto;font-size:11.5px">等待图像</span>
        </div>
        <div class="hist-box">
          <canvas id="hist"></canvas>
          <div class="st-bar" id="st-bar">
            <div class="st-range" id="st-range"></div>
            <button class="st-h blk" id="h-black" type="button" title="黑场"></button>
            <button class="st-h src" id="h-source" type="button" title="输入中调"></button>
            <button class="st-h tgt" id="h-target" type="button" title="输出中调"></button>
            <button class="st-h wht" id="h-white" type="button" title="白场"></button>
          </div>
        </div>
      </div>
      <button class="cap" id="btn-solve" style="margin-top:16px">板解算 · Plate Solve</button>
    </div>

    <!-- 右:传感器 -->
    <aside class="rail">
      <div class="sec-h" style="margin-top:0"><span class="rn">·</span><h2 style="font-size:16px">传感器</h2></div>
      <div id="sensor">
        <div class="kv"><span class="k">型号</span><span class="v" id="s-name">—</span></div>
        <div class="kv"><span class="k">尺寸 <em>px</em></span><span class="v" id="s-size">--</span></div>
        <div class="kv"><span class="k">像元 <em>µm</em></span><span class="v" id="s-pixel">--</span></div>
        <div class="kv"><span class="k">位深</span><span class="v" id="s-depth">--</span></div>
      </div>
      <div id="sensor-notice" class="muted em" style="font-size:13px;margin-top:6px;display:none">
        相机未连接 —— 请到「设备」页连接</div>
    </aside>
  </div>
</main>

<script src="/nina-theme.js"></script>
<script>
let lastImageId = null, filtersLoaded = false;
let camChipW = 0, camChipH = 0, camBitDepth = 16;   // 传感器尺寸/位深,用于按 bin 估算单帧总大小
// 只更新固定槽位的文字(asiair 式),不重建 DOM —— 切页/轮询都不闪、布局不动
function setT(id, v){ const e = document.getElementById(id); if (e) e.textContent = v; }
// 单帧下载总大小(MB):传感器像素 ÷ bin² × 每像素字节(16bit→2)。bin 给定即可估算。
function frameMB(bin){
  const w = camChipW||9576, h = camChipH||6388, bpp = Math.max(1, Math.ceil((camBitDepth||16)/8));
  bin = Math.max(1, bin||1);
  return (Math.floor(w/bin) * Math.floor(h/bin) * bpp) / 1e6;
}

async function loadFilters(){
  const fw = await Ops.get("/api/filterwheel");
  const sel = document.getElementById("filter");
  if(fw.connected && fw.filters.length){
    sel.innerHTML = fw.filters.map(f=>`<option value="${f.position}">${f.name}</option>`).join("");
    sel.disabled = false;
  } else { sel.innerHTML = `<option>—</option>`; sel.disabled = true; }
  filtersLoaded = true;
}

async function refresh(){
  const c = await Ops.get("/api/camera");
  if(!cap){   // 前端正在跟踪一次拍摄时,实时状态由状态机驱动,不被轮询覆盖
    document.getElementById("cap-state").textContent =
      ({idle:"空闲",exposing:"曝光中",downloading:"下载中",error:"错误"})[c.state]||c.state;
    setProg(c.progress*100||0);
  }
  document.getElementById("cool-stat").style.display = c.has_cooler ? "block" : "none";
  document.getElementById("cool-none").style.display = c.has_cooler ? "none" : "block";
  if(c.has_cooler){
    setT("cool-temp", c.temperature.toFixed(1)+"°C");
    setT("cool-power", c.cooler_power.toFixed(0)+"%");
    setT("cool-switch", c.cooler_on?'制冷开':'制冷关');
  }
  document.getElementById("sensor").style.display = c.connected ? "block" : "none";
  document.getElementById("sensor-notice").style.display = c.connected ? "none" : "block";
  if(c.connected){
    camChipW = c.chip_width||camChipW; camChipH = c.chip_height||camChipH; camBitDepth = c.bit_depth||camBitDepth;
    setT("s-name", c.sensor_name||c.name);
    setT("s-size", `${c.chip_width}×${c.chip_height}`);
    setT("s-pixel", c.pixel_size_um);
    setT("s-depth", `${c.bit_depth}-bit`);
  }
}

// ── 实时拍摄状态机 ──────────────────────────────────────────────
// 后端拍摄是异步的、出图可能慢;前端据"点击→曝光时长→出图"自驱一个倒计时,
// 让用户始终看到"曝光中 剩 X.Xs / 下载处理中 / 完成",而不是过早定格"空闲"。
let cap = null, capTimer = null, starting = false, _frame = 0, captureGen = 0, abortRequested = false;
let procEst = 12;   // 下载+处理耗时估计(秒);NINA 不报真实进度,故用上一张实测值自校准
function setProg(p){ document.getElementById("prog-bar").style.width = Math.max(0,Math.min(100,p))+"%"; }
function setCap(s){ setT("cap-state", s); }
function setDetail(s){ setT("cap-detail", s); }
function lockShoot(lock, mode){   // 硬约束:一旦开拍即禁用两个拍摄按钮直到本轮释放,并把当前动作按钮文案改为"拍摄中/循环中"
  const s=document.getElementById("btn-single"), l=document.getElementById("btn-loop");
  if(s){ s.disabled=lock; s.textContent = (lock && mode==="single") ? "拍摄中…" : "单张拍摄"; }
  if(l){ l.disabled=lock; l.textContent = (lock && mode==="loop") ? "循环中…" : "循环"; }
}

async function triggerCapture(mode){
  if(starting || cap) return;                      // 正在启动/拍摄中 → 忽略连点
  if(!Ops.requireControl("camera")) return;
  starting = true;
  const myGen = ++captureGen;
  let started = false;
  lockShoot(true, mode);
  setProg(0); setCap("正在启动曝光…");              // 立即反馈(同步,先于任何 await),避免"像卡住了"
  setDetail(`第 ${_frame+1} 张 · 下发参数并启动相机…`);
  try{
    await pushControls();
    const exp = +ctlVal("exp");
    const d = await Ops.action("camera","capture",{exposure:exp,gain:+ctlVal("gain"),bin:+ctlVal("bin"),mode});
    if(myGen !== captureGen || abortRequested){     // 启动期间被中止 → 撤销后端已开的拍摄
      if(d && d.ok) Ops.action("camera","abort",{});
      return;
    }
    if(d && d.ok){
      _frame++;
      cap = { exp, mode, t0: Date.now(), phase:"exposing", frame:_frame, aborting:false,
              totalMB: frameMB(+ctlVal("bin")) };   // 按 bin 估算单帧总大小
      clearInterval(capTimer); capTimer = setInterval(tickCapture, 100); tickCapture();
      Ops.status("ok", mode==="loop" ? "循环拍摄中" : "开始曝光");
      started = true;
    }
  } catch(e){
    Ops.status("err", "启动拍摄失败:" + ((e && e.message) || e));
  } finally {
    // 仅本代次负责收尾;未成功进入拍摄(失败/异常)必须解锁复位,否则按钮永久禁用
    if(myGen === captureGen){
      starting = false;
      if(!started){ setCap("空闲"); setDetail(""); lockShoot(false); }
    }
  }
}
// 进度条是"曝光 + 下载处理"的总进度(0→100%),两段按时长加权,故下载处理期也一直在走:
//  · 曝光段:真实进度(已知曝光时长)
//  · 处理段:NINA 无真实进度 → 按 procEst 估计,用渐近曲线推进、封顶 ~97%,出图即满 100%
// 两段独立进度条:① 曝光 0→100% → ② 清零 → ③ 下载/处理 0→100%
function tickCapture(){
  if(!cap) return;
  const el = (Date.now()-cap.t0)/1000;
  if(cap.phase==="exposing"){
    if(el < cap.exp){
      setProg(el/cap.exp*100);                       // 曝光段:0→100%
      setCap(`曝光中 · 剩 ${Math.max(0,cap.exp-el).toFixed(1)}s`);
      setDetail(`第 ${cap.frame} 张 · ${cap.exp}s · 增益 ${ctlVal("gain")} · 合并 ${ctlVal("bin")}${cap.mode==="loop"?" · 循环":""}`);
      return;
    }
    cap.phase="processing"; cap.procT0=Date.now();
    setProg(0);                                      // 曝光完成 → 进度条清零,转入下载/处理段
  }
  // 下载/处理段:独立 0→100%(NINA 无真实进度,按 procEst 渐近、封顶 ~97%,出图补满)
  const ps = (Date.now()-cap.procT0)/1000;
  if(ps > Math.max(60, procEst*4)){ Ops.status("warn","等待新影像超时,已结束"); stopCapture("超时结束"); return; }
  // 下载/处理:总大小按 bin 估算(确定),已传与剩余按校准后的 procEst 推算
  const frac = Math.min(0.999, ps/Math.max(1,procEst));
  const total = cap.totalMB, remain = Math.max(0, Math.ceil(procEst - ps));
  setProg(frac*100);
  setCap(`下载处理中 · 剩 ${remain}s`);
  setDetail(`第 ${cap.frame} 张 · ${(total*frac).toFixed(1)} / ${total.toFixed(1)} MB · 剩余 ${remain}s`);
}
function stopCapture(label){
  clearInterval(capTimer); capTimer = null; cap = null; starting = false; captureGen++; abortRequested = false;
  setProg(0); setCap(label||"空闲"); lockShoot(false);
}
function onImageArrived(meta){
  if(!cap) return;                                   // 非本前端发起的拍摄,交给轮询显示
  if(cap.phase !== "processing") return;             // 仍在曝光中 → 到达的是上一张图(本次尚未拍完),
                                                     // 忽略其"完成"语义,避免进度条提前跳到完成。预览图照常由 refreshImage 更新
  if(cap.procT0){                                     // 用实测下载处理耗时平滑校准估计值
    const measured = (Date.now()-cap.procT0)/1000;
    procEst = Math.max(2, procEst*0.4 + measured*0.6);
  }
  setProg(100);
  setDetail(`第 ${cap.frame} 张完成 · ${cap.totalMB.toFixed(1)} MB · HFR ${meta.hfr} · ${meta.stars} 星 · 用时 ${((Date.now()-cap.t0)/1000).toFixed(0)}s`);
  const loop = cap.mode==="loop" && !cap.aborting && !abortRequested;
  clearInterval(capTimer); capTimer = null; cap = null;        // 先清,否则连点守卫会挡住循环续拍
  if(loop){ triggerCapture("loop"); return; }                  // 循环:前端驱动下一张
  abortRequested = false;
  setCap("空闲"); lockShoot(false);                            // 单张:解锁拍摄按钮
  setTimeout(()=>{ if(!cap && !starting) setProg(0); }, 600);  // 100% 闪现后清零
}

// ── 客户端拉伸引擎(对标 asiair:从预览像素建直方图 + MTF 拉伸,黑/中/白手柄实时重渲染)──
const off = document.createElement("canvas"), octx = off.getContext("2d", { willReadFrequently:true });
let rawVals = null, rawMeta = null, histCounts = null, stretchDrag = null;
const HBINS = 256;
let stretch = { black:0, white:1, sourceMid:0.5, targetMid:0.5, mode:"stf" };  // 默认一键拉伸
function clamp(v,a,b){ return v<a?a : v>b?b : v; }
function mtf(m,x){ m=clamp(m,.001,.999); x=clamp(x,0,1); if(x<=0)return 0; if(x>=1)return 1; return ((m-1)*x)/(((2*m)-1)*x - m); }
function midToneFor(t,s){ t=clamp(t,.001,.999); s=clamp(s,.001,.999); return clamp((s*(1-t))/(t+s-(2*t*s)),.001,.999); }
function stretchState(){
  const black=clamp(stretch.black,0,.999), white=clamp(stretch.white,black+.001,1);
  const sourceMid=clamp(stretch.sourceMid,.001,.999), targetMid=clamp(stretch.targetMid,.001,.999);
  return { black, white, sourceMid, targetMid, sourcePosition:black+sourceMid*(white-black),
           midtone:midToneFor(targetMid,sourceMid), mode:stretch.mode };
}
function buildHist(){ histCounts=new Uint32Array(HBINS); if(!rawVals)return; for(let i=0;i<rawVals.length;i++) histCounts[rawVals[i]]++; }
function histPct(p){ if(!histCounts||!rawVals||!rawVals.length)return 0; const tgt=Math.max(1,Math.floor(rawVals.length*p)); let run=0;
  for(let i=0;i<HBINS;i++){ run+=histCounts[i]; if(run>=tgt) return (i+0.5)/HBINS; } return 1; }
function histMad(median){ if(!histCounts||!rawVals)return 0; const mb=clamp(Math.round(median*(HBINS-1)),0,HBINS-1), tgt=Math.max(1,Math.floor(rawVals.length*0.5)); let run=histCounts[mb];
  for(let d=1;d<HBINS;d++){ const l=mb-d,r=mb+d; if(l>=0)run+=histCounts[l]; if(r<HBINS)run+=histCounts[r]; if(run>=tgt) return d/HBINS; } return 0; }
function applyPreset(mode){
  if(!histCounts){ stretch.mode=mode; updateReadout(); return; }
  if(mode==="linear"){ stretch={black:0,white:1,sourceMid:0.5,targetMid:0.5,mode:"linear"}; renderView(); return; }
  const median=histPct(0.5), sigma=1.4826*histMad(median), strong=mode==="strong";
  let black=clamp(median+(strong?-4.5:-2.8)*sigma,0,0.98);
  let white=histPct(strong?0.9998:0.9995); if(!isFinite(white)||white<=black+0.001) white=1;
  stretch={ black, white, sourceMid:clamp((median-black)/Math.max(1e-5,white-black),.001,.999),
            targetMid:strong?0.42:0.25, mode:strong?"strong":"stf" };
  renderView();
}
function renderView(){
  const v=document.getElementById("view"); if(!v) return; const vctx=v.getContext("2d");
  if(!rawMeta||!rawVals){ drawHist(); return; }
  const {black,white,midtone}=stretchState(), inv=1/Math.max(1e-5,white-black), lut=new Uint8Array(256);
  for(let n=0;n<256;n++){ const x=((n/255)-black)*inv; lut[n]= x<=0?0 : x>=1?255 : Math.round(mtf(midtone,x)*255); }
  const w=rawMeta.width,h=rawMeta.height; if(v.width!==w)v.width=w; if(v.height!==h)v.height=h;
  const id=vctx.createImageData(w,h), d=id.data;
  for(let i=0,j=0;i<rawVals.length;i++,j+=4){ const y=lut[rawVals[i]]; d[j]=d[j+1]=d[j+2]=y; d[j+3]=255; }
  vctx.putImageData(id,0,0); drawHist();
}
// 取预览图 → 离屏抽像素(单色取 R 通道)→ 建直方图 → 应用拉伸。带 onerror 退避重试。
function loadPreview(id){
  const img=new Image(); img._rt=0;
  img.onload=()=>{
    const w=img.naturalWidth||1,h=img.naturalHeight||1;
    off.width=w; off.height=h; octx.drawImage(img,0,0);
    let px; try{ px=octx.getImageData(0,0,w,h).data; }catch(e){ return; }
    rawVals=new Uint8Array(w*h); for(let i=0,j=0;i<rawVals.length;i++,j+=4) rawVals[i]=px[j];
    rawMeta={width:w,height:h}; buildHist();
    if(stretch.mode==="manual") renderView(); else applyPreset(stretch.mode||"stf");
  };
  img.onerror=()=>{ if(++img._rt<=4) setTimeout(()=>{ img.src=`/api/camera/image?image_id=${id}&r=${img._rt}&t=${Date.now()}`; }, 600); };
  img.src=`/api/camera/image?image_id=${id}&t=${Date.now()}`;
}
function drawHist(){
  const cv=document.getElementById("hist"); if(!cv) return; const ctx=cv.getContext("2d");
  const rect=cv.getBoundingClientRect(), dpr=window.devicePixelRatio||1, W=rect.width||240, H=rect.height||118;
  const pw=Math.max(1,Math.floor(W*dpr)), ph=Math.max(1,Math.floor(H*dpr));
  if(cv.width!==pw)cv.width=pw; if(cv.height!==ph)cv.height=ph;
  ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H); ctx.fillStyle="#05070d"; ctx.fillRect(0,0,W,H);
  if(histCounts){
    let maxLog=1; for(let i=0;i<HBINS;i++) maxLog=Math.max(maxLog,Math.log1p(histCounts[i]));
    const xs=W/Math.max(1,HBINS-1);
    ctx.beginPath(); ctx.moveTo(0,H);
    for(let i=0;i<HBINS;i++) ctx.lineTo(i*xs, H-(Math.log1p(histCounts[i])/maxLog)*H);
    ctx.lineTo(W,H); ctx.closePath();
    ctx.fillStyle="rgba(201,162,39,.18)"; ctx.fill();
    ctx.strokeStyle="rgba(201,162,39,.9)"; ctx.lineWidth=1; ctx.stroke();
    const {black,white,midtone}=stretchState();
    ctx.beginPath();
    for(let p=0;p<=W;p++){ const n=p/Math.max(1,W);
      const m= n<=black?0 : n>=white?1 : mtf(midtone,(n-black)/Math.max(1e-5,white-black));
      const y=H-m*H; if(p===0)ctx.moveTo(p,y); else ctx.lineTo(p,y); }
    ctx.strokeStyle="rgba(233,226,208,.82)"; ctx.lineWidth=1.2; ctx.stroke();
    const s=stretchState(), mk=(pos,col,dash)=>{ ctx.save(); ctx.strokeStyle=col; ctx.setLineDash(dash||[]); ctx.beginPath(); ctx.moveTo(pos*W,0); ctx.lineTo(pos*W,H); ctx.stroke(); ctx.restore(); };
    mk(s.black,"#c9a227"); mk(s.sourcePosition,"#c9a227",[4,3]); mk(s.targetMid,"#cdbf95",[2,3]); mk(s.white,"#f0e6c8");
  }
  updateHandles(); updateReadout();
}
function updateHandles(){
  const s=stretchState(), set=(id,p)=>{ const e=document.getElementById(id); if(e) e.style.left=(p*100)+"%"; };
  set("h-black",s.black); set("h-source",s.sourcePosition); set("h-target",s.targetMid); set("h-white",s.white);
  const r=document.getElementById("st-range"); if(r){ r.style.left=(s.black*100)+"%"; r.style.width=(Math.max(0,s.white-s.black)*100)+"%"; }
}
function updateReadout(){
  const s=stretchState(), L={linear:"线性",stf:"一键拉伸",strong:"强拉伸",manual:"手动"};
  setT("st-readout", rawVals ? `${L[s.mode]||s.mode} · 黑 ${Math.round(s.black*255)} · 白 ${Math.round(s.white*255)}` : "等待图像");
}

async function refreshImage(){
  const r = await Ops.get("/api/camera/current-image");
  if(!r.image) return;
  if(r.image.image_id !== lastImageId){
    lastImageId = r.image.image_id;
    loadPreview(lastImageId);
    const im = r.image;
    Ops.status("ok", `新影像 #${lastImageId}${im.filter?" · "+im.filter:""}${im.exposure_s?" · "+im.exposure_s+"s":""} · HFR ${im.hfr} · ${im.stars} 星`);
    onImageArrived(im);
  }
}

function ctlVal(id){ return document.getElementById(id).value; }

// 拉伸预设按钮 + 手柄拖动(move/up 仅拖动期间挂载,松手即卸,避免 SPA 切页泄漏监听)
{ const presets={ "st-stf":"stf","st-strong":"strong","st-linear":"linear" };
  for(const id in presets){ const e=document.getElementById(id); if(e) e.onclick=()=>applyPreset(presets[id]); }
  const hmap={ "h-black":"black","h-source":"source","h-target":"target","h-white":"white" };
  const onMove=(ev)=>{
    if(!stretchDrag||!rawVals) return;
    const bar=document.getElementById("st-bar"); if(!bar) return;
    const rect=bar.getBoundingClientRect(), x=clamp((ev.clientX-rect.left)/rect.width,0,1), cur=stretchState();
    if(stretchDrag==="black"){ stretch.black=clamp(x,0,cur.white-0.001); stretch.sourceMid=clamp((cur.sourcePosition-stretch.black)/Math.max(.001,cur.white-stretch.black),.001,.999); }
    else if(stretchDrag==="white"){ stretch.white=clamp(x,cur.black+0.001,1); stretch.sourceMid=clamp((cur.sourcePosition-cur.black)/Math.max(.001,stretch.white-cur.black),.001,.999); }
    else if(stretchDrag==="source"){ stretch.sourceMid=clamp((x-cur.black)/Math.max(.001,cur.white-cur.black),.001,.999); }
    else if(stretchDrag==="target"){ stretch.targetMid=clamp(x,.001,.999); }
    stretch.mode="manual"; renderView();
  };
  const onUp=()=>{ stretchDrag=null; document.removeEventListener("pointermove",onMove); document.removeEventListener("pointerup",onUp); };
  for(const id in hmap){ const e=document.getElementById(id); if(e) e.addEventListener("pointerdown",(ev)=>{
    if(!rawVals) return; stretchDrag=hmap[id]; ev.preventDefault();
    document.addEventListener("pointermove",onMove); document.addEventListener("pointerup",onUp);
  }); }
}

document.getElementById("btn-single").onclick = ()=>{ abortRequested=false; triggerCapture("single"); };
document.getElementById("btn-loop").onclick = ()=>{ abortRequested=false; triggerCapture("loop"); };
document.getElementById("btn-abort").onclick = async ()=>{
  if(!Ops.requireControl("camera")) return;
  abortRequested = true;                  // 全局中止:即使此刻 cap 尚未建立(启动/续拍 await 窗口)也生效
  if(cap) cap.aborting = true;
  const d = await Ops.action("camera","abort",{});
  stopCapture("已中止");                   // 注:stopCapture 会复位 abortRequested=false
  if(d.ok) Ops.status("warn","已中止曝光");
};
document.getElementById("btn-cool").onclick = async ()=>{
  if(!Ops.requireControl("camera")) return;
  const d = await Ops.action("camera","cool",{temperature:+ctlVal("ttemp")}); if(d.ok) Ops.status("ok","开始制冷至 "+ctlVal("ttemp")+"°C");
};
document.getElementById("btn-warm").onclick = async ()=>{
  if(!Ops.requireControl("camera")) return;
  const d = await Ops.action("camera","warm",{}); if(d.ok) Ops.status("ok","开始回温");
};
document.getElementById("btn-solve").onclick = async ()=>{
  if(!Ops.requireControl("camera")) return;
  Ops.status("ok","板解算中…");
  const d = await Ops.post("/api/camera/platesolve", {});
  if(d && d.solved) Ops.status("ok",`板解算成功 · RA ${d.ra_text} · Dec ${d.dec_text} · 旋转 ${d.rotation}°`);
  else Ops.status("err",(d&&d.error)||"板解算失败");
};

// 拍摄前下发增益/偏置(相机域);滤镜轮属另一域,仅当它也可控时才切,免得在"仅相机解禁"下报错
function fwWritable(){ return !Ops.readonly || Ops.writableDomains.includes("filterwheel"); }
async function pushControls(){
  await Ops.action("camera","set_control",{name:"Gain",value:+ctlVal("gain")});
  await Ops.action("camera","set_control",{name:"Offset",value:+ctlVal("offset")});
  if(!document.getElementById("filter").disabled && fwWritable())
    await Ops.action("filterwheel","change",{position:+ctlVal("filter")});
}

document.addEventListener("ops:ready", ()=>{ loadFilters(); refresh(); refreshImage(); });
// 拍完刷新预览:保存触发 IMAGE-SAVE,快照触发 IMAGE-PREPARED / API-CAPTURE-FINISHED;轮询兜底
Ops.onEvent((e)=>{
  const ev = e.event || "";
  if(/IMAGE-SAVE|IMAGE-PREPARED|CAPTURE-FINISHED/.test(ev)) refreshImage();
  if(e.domain==="camera") refresh();
});
setInterval(()=>{ if(!document.hidden){ refresh(); refreshImage(); if(!filtersLoaded) loadFilters(); } }, 2000);
</script>

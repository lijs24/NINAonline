<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>html,body{background:#0a0e1a;color:#e9e2d0;margin:0;font-family:"Noto Serif SC","Source Han Serif SC","Songti SC",serif}</style>
<link rel="stylesheet" href="/nina-theme.css">
<title>星枢 · 总览</title>
</head>
<body>
<header id="app-topbar"></header>

<main class="wrap view-pending">
  <div class="col-rail">
    <div>
      <!-- Ⅰ 设备一览 -->
      <div class="sec-h"><span class="rn">Ⅰ</span><h2>设备一览</h2>
        <span class="en">Equipment</span></div>
      <div id="dev-grid" style="columns:2;column-gap:40px;">
        <div class="kv"><span class="k"><span class="dot" id="dev-camera-dot"></span> 相机</span><span class="v muted" id="dev-camera">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-mount-dot"></span> 赤道仪</span><span class="v muted" id="dev-mount">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-focuser-dot"></span> 对焦</span><span class="v muted" id="dev-focuser">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-filterwheel-dot"></span> 滤镜轮</span><span class="v muted" id="dev-filterwheel">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-guider-dot"></span> 导星</span><span class="v muted" id="dev-guider">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-rotator-dot"></span> 旋转器</span><span class="v muted" id="dev-rotator">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-dome-dot"></span> 圆顶</span><span class="v muted" id="dev-dome">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-flatdevice-dot"></span> 平场</span><span class="v muted" id="dev-flatdevice">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-switch-dot"></span> 开关</span><span class="v muted" id="dev-switch">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-weather-dot"></span> 气象</span><span class="v muted" id="dev-weather">—</span></div>
        <div class="kv"><span class="k"><span class="dot" id="dev-safetymonitor-dot"></span> 安全</span><span class="v muted" id="dev-safetymonitor">—</span></div>
      </div>

      <!-- Ⅱ 当前目标 / 序列 -->
      <div class="sec-h"><span class="rn">Ⅱ</span><h2>当前目标 · 序列</h2>
        <span class="en">Target & Sequence</span></div>
      <div id="seq-block">
        <div class="kv" id="seq-pos-row" style="display:none"><span class="k">指向 <em>RA·Dec</em></span><span class="v cel" id="seq-pos">--</span></div>
        <div class="kv" id="seq-target-row" style="display:none"><span class="k">目标 <em>target</em></span><span class="v gold" id="seq-target">—</span></div>
        <div class="kv"><span class="k">计划 <em>plan</em></span><span class="v" id="seq-plan">—</span></div>
        <div class="kv"><span class="k">状态 <em>status</em></span><span class="v" id="seq-status">—</span></div>
        <div class="kv"><span class="k">当前 <em>action</em></span><span class="v" id="seq-action">—</span></div>
        <div class="kv"><span class="k">进度 <em>frames</em></span><span class="v gold" id="seq-progress">--</span></div>
        <div style="height:2px;background:var(--hair);margin:12px 0 4px">
          <div id="seq-bar" style="height:2px;width:0%;background:var(--gold);transition:width .5s"></div></div>
      </div>

      <!-- Ⅲ 最新影像 -->
      <div class="sec-h"><span class="rn">Ⅲ</span><h2>最新影像</h2>
        <span class="en">Last Frame</span></div>
      <div id="img-block">
        <div id="img-empty" class="muted em">尚无影像</div>
        <div id="img-detail" style="display:none">
          <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap">
            <img id="img-thumb" src="" style="width:380px;max-width:100%;border:1px solid var(--hair)">
            <div style="min-width:180px">
              <div class="kv"><span class="k">目标</span><span class="v" id="img-target">—</span></div>
              <div class="kv"><span class="k">滤镜·曝光</span><span class="v" id="img-filterexp">—</span></div>
              <div class="kv"><span class="k">HFR <em>focus</em></span><span class="v gold" id="img-hfr">--</span></div>
              <div class="kv"><span class="k">星点 <em>stars</em></span><span class="v" id="img-stars">--</span></div>
              <div class="kv"><span class="k">温度</span><span class="v" id="img-temp">--</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧注记栏 -->
    <aside class="rail">
      <div class="sec-h" style="margin-top:0"><span class="rn">·</span><h2 style="font-size:16px">观测站</h2></div>
      <div id="site-block">
        <div class="kv"><span class="k">纬度 <em>lat</em></span><span class="v" id="site-lat">--</span></div>
        <div class="kv"><span class="k">经度 <em>lng</em></span><span class="v" id="site-lng">--</span></div>
        <div class="kv"><span class="k">后端 <em>mode</em></span><span class="v gold" id="site-mode">—</span></div>
        <div class="kv"><span class="k">导星 RMS</span><span class="v muted" id="site-rms">—</span></div>
      </div>
      <div class="sec-h"><span class="rn">·</span><h2 style="font-size:16px">事件流</h2>
        <span class="en">Log</span></div>
      <div id="evt-feed" style="font-size:13px;line-height:1.9"></div>
    </aside>
  </div>
</main>

<script src="/nina-theme.js"></script>
<script>
// 只更新固定槽位的文字(asiair 式),不重建 DOM —— 切页/轮询都不闪、布局不动
function setT(id, v){ const e = document.getElementById(id); if (e) e.textContent = v; }

async function refreshDevices(){
  const d = await Ops.get("/api/devices");
  (d.devices||[]).forEach(dev=>{
    const v = document.getElementById("dev-"+dev.type);
    const dot = document.getElementById("dev-"+dev.type+"-dot");
    if(!v) return;
    const on = dev.connected;
    v.textContent = on ? (dev.detail||'已连接') : '—';
    v.classList.toggle("gold", !!on);
    v.classList.toggle("muted", !on);
    if(dot) dot.classList.toggle("on", !!on);
  });
}

async function refreshSequence(){
  const s = await Ops.get("/api/sequence");
  const running = s.running;
  const pct = Math.round((s.progress||0)*100);
  const plan = s.plan||{};
  setT("seq-plan", plan.name||'—');
  const st = document.getElementById("seq-status");
  st.textContent = ({idle:'空闲',running:'运行中',paused:'暂停',finished:'已完成',error:'错误'})[s.status]||s.status;
  st.classList.toggle("gold", !!running);
  setT("seq-action", s.current_action||'—');
  setT("seq-progress", s.completed_frames+"/"+s.total_frames+" · "+pct+"%");
  document.getElementById("seq-bar").style.width = pct+"%";
}

async function refreshMountTarget(){
  const m = await Ops.get("/api/mount");
  const posRow = document.getElementById("seq-pos-row");
  const targetRow = document.getElementById("seq-target-row");
  if(!m.connected){ posRow.style.display="none"; targetRow.style.display="none"; return; }
  document.getElementById("seq-pos").innerHTML = Ops.fmtRA(m.ra_hours)+" &nbsp; "+Ops.fmtDec(m.dec_degrees);
  setT("seq-target", m.target_name||'—');
  posRow.style.display=""; targetRow.style.display="";
}

async function refreshImage(){
  const r = await Ops.get("/api/camera/current-image");
  const empty = document.getElementById("img-empty");
  const detail = document.getElementById("img-detail");
  if(!r.image){ empty.style.display=""; detail.style.display="none"; return; }
  const im = r.image;
  document.getElementById("img-thumb").src = "/api/camera/image?image_id="+im.image_id+"&t="+Date.now();
  setT("img-target", im.target||'—');
  setT("img-filterexp", im.filter+" · "+im.exposure_s+"s");
  setT("img-hfr", im.hfr);
  setT("img-stars", im.stars);
  setT("img-temp", im.temperature+"°C");
  empty.style.display="none"; detail.style.display="";
}

async function refreshSite(){
  const s = window.OPS_BOOT || await Ops.get("/api/status");
  const site = s.site||{};
  const g = await Ops.get("/api/guider");
  setT("site-lat", (site.lat||0).toFixed(3)+"°");
  setT("site-lng", (site.lng||0).toFixed(3)+"°");
  setT("site-mode", s.provider==='sim'?'模拟引擎':'NINA 实机');
  const rms = document.getElementById("site-rms");
  const guiding = g.state==='guiding';
  rms.textContent = guiding ? g.rms_total+'″' : '—';
  rms.classList.toggle("gold", guiding);
  rms.classList.toggle("muted", !guiding);
}

const EVT_ZH = {"IMAGE-SAVE":"已保存影像","MOUNT-SLEWED":"赤道仪到位","MOUNT-SLEW-START":"开始转向",
  "AUTOFOCUS-STARTING":"自动对焦开始","AUTOFOCUS-FINISHED":"自动对焦完成","GUIDER-START":"导星开始",
  "GUIDER-DITHER":"抖动","GUIDER-STOP":"导星停止","SEQUENCE-STARTING":"序列开始","SEQUENCE-FINISHED":"序列完成",
  "CAMERA-CONNECTED":"相机已连接","MOUNT-PARKED":"赤道仪已停靠","FILTERWHEEL-CHANGED":"切换滤镜"};
const feed = [];
function pushEvent(evt){
  const zh = EVT_ZH[evt.event];
  if(!zh) return;
  const t = (evt.time||"").slice(11,19);
  feed.unshift(`<div><span class="muted">${t}</span> · <span class="v">${zh}</span></div>`);
  feed.splice(20);
  document.getElementById("evt-feed").innerHTML = feed.join("");
}

function refreshAll(){
  refreshDevices(); refreshSequence().then(refreshMountTarget);
  refreshImage(); refreshSite();
}
document.addEventListener("ops:ready", refreshAll);
Ops.onEvent((evt)=>{ pushEvent(evt);
  if(["IMAGE-SAVE"].includes(evt.event)) refreshImage();
  if(evt.domain==="sequence"||evt.event==="STATE-UPDATED") refreshSequence().then(refreshMountTarget);
});
setInterval(()=>{ if(!document.hidden) refreshAll(); }, 5000);
</script>
</body>
</html>

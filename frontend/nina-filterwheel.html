<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>html,body{background:#0a0e1a;color:#e9e2d0;margin:0;font-family:"Noto Serif SC","Source Han Serif SC","Songti SC",serif}</style>
<link rel="stylesheet" href="/nina-theme.css">
<title>星枢 · 滤镜轮</title>
<style>
  .now{margin:2px 0 4px;display:flex;align-items:baseline;gap:14px;}
  .now .big{font-size:34px;color:var(--gold);letter-spacing:1px;line-height:1.1;}
  .now .sub{font-size:13px;}
  .slot{display:flex;align-items:center;gap:14px;padding:9px 0;
    border-bottom:1px solid var(--hair-soft);cursor:pointer;
    transition:color .25s;}
  .slot:hover{color:var(--gold);}
  .slot[aria-disabled="true"]{cursor:default;}
  .slot[aria-disabled="true"]:hover{color:inherit;}
  .slot .pos{width:34px;text-align:center;color:var(--ink-dim);
    font-variant-numeric:tabular-nums;}
  .slot.cur .pos{color:var(--gold);}
  .slot .nm{flex:1;}
  .slot.cur .nm{color:var(--gold);}
  .slot .off{font-variant-numeric:tabular-nums;color:var(--ink-dim);font-size:13px;}
  .slot .edit{width:120px;text-align:left;}
</style>
</head>
<body>
<header id="app-topbar"></header>

<main class="wrap view-pending">
  <div class="col-rail">
    <div>
      <div class="sec-h" style="margin-top:0"><span class="rn">Ⅰ</span><h2>当前滤镜</h2>
        <span class="en">Current Filter</span><span id="fw-state" class="muted" style="margin-left:auto;font-size:13px"></span></div>
      <div id="now">
        <div class="now"><span class="big" id="fw-cur-name">—</span>
          <span class="sub muted">槽位 <span class="v gold" id="fw-cur-pos">#--</span><span id="fw-cur-moving"></span></span></div>
        <div class="kv"><span class="k">轮组 <em>wheel</em></span><span class="v" id="fw-wheel">—</span></div>
        <div class="kv"><span class="k">对焦偏置 <em>offset</em></span><span class="v"><span id="fw-cur-offset">--</span> <span class="muted">步</span></span></div>
      </div>
      <div id="now-notice" class="muted em" style="display:none">
        滤镜轮未连接 —— 请到「设备」页连接</div>

      <div class="sec-h"><span class="rn">Ⅱ</span><h2>滤镜槽 · 切换</h2><span class="en">Slots · Change</span>
        <button class="cap" id="btn-rename" style="margin-left:auto">编辑名称</button></div>
      <div id="slots"></div>
      <div id="rename-bar" style="display:none;gap:10px;margin-top:14px;flex-wrap:wrap">
        <button class="cap solid" id="btn-save">保存名称</button>
        <button class="cap" id="btn-cancel">取消</button>
      </div>
    </div>

    <aside class="rail">
      <div class="sec-h" style="margin-top:0"><span class="rn">·</span><h2 style="font-size:16px">概况</h2></div>
      <div id="summary">
        <div class="kv"><span class="k">槽位数 <em>count</em></span><span class="v gold" id="fw-count">--</span></div>
        <div class="kv"><span class="k">当前槽 <em>position</em></span><span class="v gold" id="fw-pos">#--</span></div>
        <div class="kv"><span class="k">状态 <em>state</em></span><span class="v" id="fw-statev">—</span></div>
      </div>
      <div class="sec-h"><span class="rn">·</span><h2 style="font-size:16px">对焦偏置</h2></div>
      <div id="offsets"></div>
    </aside>
  </div>
</main>

<script src="/nina-theme.js"></script>
<script>
let editing = false;
function setT(id, v){ const e = document.getElementById(id); if (e) e.textContent = v; }

// 仅在滤镜集(数量/名称/偏置)变化时重建变长列表;平时只切高亮
let slotsSig = null;
function filtersSig(fw){
  return (fw.filters||[]).map(f=>`${f.position}|${f.name}|${f.focus_offset}`).join("\n");
}

async function refresh(){
  if(editing) return;
  const fw = await Ops.get("/api/filterwheel");
  const cur = (fw.filters||[]).find(f=>f.position===fw.position);

  setT("fw-state", !fw.connected ? "未连接"
    : fw.is_moving ? "切换中…" : "就绪");

  if(!fw.connected){
    document.getElementById("now").style.display = "none";
    document.getElementById("now-notice").style.display = "block";
    document.getElementById("slots").innerHTML = "";
    document.getElementById("offsets").innerHTML = "";
    slotsSig = null;
    setT("fw-count", "--");
    setT("fw-pos", "#--");
    setT("fw-statev", "—");
    document.getElementById("btn-rename").disabled = true;
    return;
  }
  document.getElementById("now").style.display = "";
  document.getElementById("now-notice").style.display = "none";
  document.getElementById("btn-rename").disabled = false;

  // 当前滤镜读数(原位更新)
  setT("fw-cur-name", cur ? cur.name : "—");
  setT("fw-cur-pos", "#" + fw.position);
  document.getElementById("fw-cur-moving").innerHTML = fw.is_moving ? ' · <span class="em">切换中…</span>' : '';
  setT("fw-wheel", fw.name || "—");
  setT("fw-cur-offset", cur ? cur.focus_offset : 0);

  // 概况读数(原位更新)
  setT("fw-count", fw.filters.length);
  setT("fw-pos", "#" + fw.position);
  setT("fw-statev", fw.is_moving ? "切换中" : "就绪");

  renderSlots(fw);

  // 对焦偏置列表:仅在滤镜集变化时重建
  const sig = filtersSig(fw);
  if(sig !== slotsSig){
    document.getElementById("offsets").innerHTML = fw.filters.map(f=>
       `<div class="kv" data-pos="${f.position}"><span class="k">${f.name} <em>#${f.position}</em></span>`
      +`<span class="v">${f.focus_offset>=0?'+':''}${f.focus_offset}</span></div>`).join("");
  }
  // 当前槽高亮(toggle class,不重建)
  document.querySelectorAll("#offsets .kv").forEach(el=>{
    el.querySelector(".v").classList.toggle("gold", +el.dataset.pos===fw.position);
  });
}

function renderSlots(fw){
  const el = document.getElementById("slots");
  const sig = filtersSig(fw);
  if(sig !== slotsSig){
    // 滤镜集变化 → 重建整列表
    el.innerHTML = fw.filters.map(f=>
       `<div class="slot" data-pos="${f.position}">`
      +`<span class="pos"><span class="dot on cur-dot" style="margin-right:6px;display:none"></span><span class="pos-num">#${f.position}</span></span>`
      +`<span class="nm">${f.name}</span>`
      +`<span class="off">焦偏 ${f.focus_offset>=0?'+':''}${f.focus_offset}</span></div>`).join("");
    slotsSig = sig;
    el.querySelectorAll(".slot").forEach(s=>s.onclick=async ()=>{
      if(s.getAttribute("aria-disabled")==="true") return;
      const pos = +s.dataset.pos;
      const live = await Ops.get("/api/filterwheel");
      if(pos===live.position){ Ops.status("ok","已是当前滤镜"); return; }
      if(!Ops.requireControl()) return;
      const d = await Ops.action("filterwheel","change",{position:pos});
      if(d.ok) Ops.status("ok",`切换至 #${pos} ${live.filters.find(x=>x.position===pos).name}`);
    });
  }
  // 当前槽高亮 + 切换中禁用态(只切 class/属性,不重建)
  el.querySelectorAll(".slot").forEach(s=>{
    const cur = +s.dataset.pos===fw.position;
    s.classList.toggle("cur", cur);
    const dot = s.querySelector(".cur-dot");
    if(dot) dot.style.display = cur ? "inline-block" : "none";
    if(fw.is_moving) s.setAttribute("aria-disabled","true");
    else s.removeAttribute("aria-disabled");
  });
}

// —— 名称编辑 ——————————————————————————————————————————————
document.getElementById("btn-rename").onclick = async ()=>{
  if(!Ops.requireControl()) return;
  const fw = await Ops.get("/api/filterwheel");
  if(!fw.connected || !fw.filters.length) return;
  editing = true;
  slotsSig = null;
  document.getElementById("slots").innerHTML = fw.filters.map(f=>
     `<div class="slot" aria-disabled="true">`
    +`<span class="pos">#${f.position}</span>`
    +`<input class="fld edit nm-in" data-pos="${f.position}" value="${f.name}">`
    +`<span class="off">焦偏 ${f.focus_offset>=0?'+':''}${f.focus_offset}</span></div>`).join("");
  document.getElementById("rename-bar").style.display = "flex";
  document.getElementById("btn-rename").disabled = true;
  Ops.status("warn","编辑滤镜名称 —— 保存后下发轮组");
};
document.getElementById("btn-cancel").onclick = ()=>{
  editing = false;
  slotsSig = null;
  document.getElementById("rename-bar").style.display = "none";
  document.getElementById("btn-rename").disabled = false;
  refresh();
};
document.getElementById("btn-save").onclick = async ()=>{
  if(!Ops.requireControl()) return;
  const names = Array.from(document.querySelectorAll(".nm-in"))
    .sort((a,b)=>(+a.dataset.pos)-(+b.dataset.pos))
    .map(i=>i.value.trim()||("F"+i.dataset.pos));
  const d = await Ops.action("filterwheel","set_names",{names});
  if(d.ok){
    Ops.status("ok","滤镜名称已更新");
    editing = false;
    slotsSig = null;
    document.getElementById("rename-bar").style.display = "none";
    document.getElementById("btn-rename").disabled = false;
    refresh();
  }
};

document.addEventListener("ops:ready", refresh);
Ops.onEvent((e)=>{ if(e.event==="FILTERWHEEL-CHANGED" || e.domain==="filterwheel") refresh(); });
setInterval(()=>{ if(!document.hidden) refresh(); }, 1500);
</script>
</body>
</html>
